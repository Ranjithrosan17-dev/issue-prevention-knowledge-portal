version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kp_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kp_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_prod_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: kp_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: kp_frontend_prod
    restart: always
    depends_on:
      - backend
    ports:
      - '3000:80'

volumes:
  postgres_prod_data:
  redis_prod_data:
